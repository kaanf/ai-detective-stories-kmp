name: Dev To Main CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  lint-and-unit-tests:
    if: github.event_name != 'pull_request' || github.head_ref == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run ktlint, detekt, and unit tests
        run: ./gradlew --no-daemon ktlintCheck detekt testDebugUnitTest

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-and-unit-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
            **/build/reports/detekt/**

  android-instrumented-tests:
    if: github.event_name != 'pull_request' || github.head_ref == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: lint-and-unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Install Android 36 platform
        run: sdkmanager "platforms;android-36" "platform-tools"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-boot-timeout: 900
          disable-animations: true
          script: ./gradlew --no-daemon connectedDebugAndroidTest

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-test-reports
          path: |
            **/build/reports/androidTests/**
            **/build/outputs/androidTest-results/**
            **/build/test-results/**
